name: Deploy Backend to Hugging Face

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN || secrets.HUGGINGFACE_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: deploy/hf_space/requirements.txt

      - name: Prepare HF workspace
        run: |
          mkdir -p hf_space_repo
          git clone https://huggingface.co/spaces/rppooo/ai_platform hf_space_repo
          rsync -a --delete \
            --exclude ".git" \
            --exclude "hf_space_repo" \
            --exclude "platform_projects" \
            --exclude "shared" \
            --exclude "gui/node_modules" \
            --exclude "gui/dist" \
            --exclude ".agent_tmp" \
            ./ hf_space_repo/

      - name: Ensure HF Dockerfiles
        run: |
          rsync -a deploy/hf_space/ hf_space_repo/

      - name: Verify HF token
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN is missing. Add repo secret HF_TOKEN (or HUGGINGFACE_API_KEY) with write access to the space."
            exit 1
          fi

      - name: Commit and push
        run: |
          cd hf_space_repo
          git config user.email "ci@github-actions"
          git config user.name "github-actions"
          git add -A
          git commit -m "deploy: update backend" || echo "No changes to commit"
          git remote set-url origin https://user:${HF_TOKEN}@huggingface.co/spaces/rppooo/ai_platform
          git push origin main
